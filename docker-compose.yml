services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 ultrasound_joystick.asgi:application
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app/backend

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    command: npm run dev
    depends_on:
      - backend
    environment:
      - VITE_API_HOST
      - VITE_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://frontend:5173 --no-autoupdate
    depends_on:
      - frontend
    profiles:
      - tunnel

volumes:
  frontend_node_modules:
